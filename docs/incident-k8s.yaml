# A small multi-tier "shop" stack with one realistic production failure injected:
# payment-api crash-loops because a required env var is missing (a classic bad deploy).
apiVersion: v1
kind: Namespace
metadata:
  name: shop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: shop
  labels: { app: storefront, tier: frontend }
spec:
  replicas: 2
  selector: { matchLabels: { app: storefront } }
  template:
    metadata:
      labels: { app: storefront, tier: frontend }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shop
  labels: { app: redis, tier: cache }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis } }
  template:
    metadata:
      labels: { app: redis, tier: cache }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: shop
  labels: { app: payment-api, tier: backend }
spec:
  replicas: 2
  selector: { matchLabels: { app: payment-api } }
  template:
    metadata:
      labels: { app: payment-api, tier: backend }
    spec:
      containers:
        - name: payment
          image: busybox:1.36
          # Simulates a bad deploy: the app refuses to boot without PAYMENT_DB_URL,
          # so it crash-loops. (No real secret is used.)
          command: ["sh", "-c"]
          args:
            - >
              if [ -z "$PAYMENT_DB_URL" ]; then
                echo "FATAL: PAYMENT_DB_URL is not set; cannot connect to payments database" >&2;
                exit 1;
              fi;
              echo "payment-api listening"; sleep 3600
